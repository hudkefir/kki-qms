name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: kki-production-dashboard
  SERVICE: kki-qms
  REGION: us-east1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --port 8080 \
            --allow-unauthenticated \
            --quiet

      - name: Get deployment URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Post-deploy health check
        run: |
          echo "Waiting 10s for new revision to stabilize..."
          sleep 10
          echo "Checking health endpoint..."
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ steps.url.outputs.url }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            curl -s "${{ steps.url.outputs.url }}/api/health" || true
            exit 1
          fi
          echo "✅ Health check passed (HTTP 200)"

      - name: Post-deploy write verification
        env:
          QMS_DEPLOY_KEY: ${{ secrets.QMS_DEPLOY_KEY }}
        run: |
          echo "Running deploy verification (DB write test)..."
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST \
            -H "x-deploy-key: $QMS_DEPLOY_KEY" \
            "${{ steps.url.outputs.url }}/api/deploy-verify")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Response (HTTP $HTTP_CODE):"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deploy verification FAILED"
            exit 1
          fi
          echo "✅ Deploy verification passed — write test OK"
